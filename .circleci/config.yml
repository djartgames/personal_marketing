version: 2.1

workflows:
  test-and-release:
    jobs:
      - jasmine:
          filters:
            tags:
              only: /.*/
      - checks:
          filters:
            tags:
              only: /.*/
      - coverage-final:
          requires: [jasmine]
          filters:
            tags:
              only: /.*/

jobs:
  jasmine:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Copy Edwin source into example
          command: cp -r source personal_marketing/edwin
      - run:
          name: Install dependencies
          command: cd personal_marketing; yarn install
      - run:
          name: Unit tests (Vitest + coverage)
          command: cd personal_marketing; npm run coverage

  checks:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd personal_marketing; yarn install
      - run:
          name: Lint
          command: cd personal_marketing; npm run lint
      - run:
          name: Duplication report (JSCPD)
          command: cd personal_marketing; npm run report

  coverage-final:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - run:
          name: Finalize coverage on Codacy
          command: bash <(curl -Ls https://coverage.codacy.com/get.sh) final
