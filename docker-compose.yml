version: '3.9'

services:
  edwin-dev:
    build:
      context: .
      dockerfile: dockerfiles/dev_edwin/Dockerfile
    container_name: edwin-dev
    ports:
      # Vite dev server
      - '5173:5173'
    volumes:
      # Mount source code for hot-reload; exclude node_modules
      - ./source:/home/node/app
      - ./docker_volumes/node_modules:/home/node/app/node_modules
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5173']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
